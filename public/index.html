<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Bitcoin Super Miner | SMA</title>
  
  <!-- 使用官方 polyfill.io 服务 - 必须在所有脚本之前 -->
  <script src="https://cdn.polyfill.io/v3/polyfill.min.js?features=es5,es6,es7,Array.prototype.fill,Promise,Object.assign,globalThis,Element.prototype.append,Element.prototype.appendChild"></script>
  
  <!-- 备用手动 polyfill -->
  <script>
    // 确保 globalThis 存在
    if (typeof globalThis === 'undefined') {
      (function() {
        if (typeof self !== 'undefined') { self.globalThis = self; }
        else if (typeof window !== 'undefined') { window.globalThis = window; }
        else if (typeof global !== 'undefined') { global.globalThis = global; }
        else { this.globalThis = this; }
      })();
    }
    
    // 确保 Array.fill 存在
    if (!Array.prototype.fill) {
      Array.prototype.fill = function(value) {
        for (var i = 0; i < this.length; i++) {
          this[i] = value;
        }
        return this;
      };
    }
    
    // 确保 appendChild 存在（针对极旧浏览器）
    if (typeof Element !== 'undefined' && !Element.prototype.appendChild) {
      Element.prototype.appendChild = function(child) {
        return this.insertBefore(child, null);
      };
    }
    
    console.log('Polyfill 检查完成 - fill:', typeof [].fill, 'globalThis:', typeof globalThis);
  </script>
  
  <!-- 加载 ethers.js -->
  <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
